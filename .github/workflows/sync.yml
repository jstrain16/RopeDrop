name: Sync Alta Status

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger sync endpoint
        run: |
          curl -X POST "${{ secrets.API_BASE_URL }}/api/internal/sync" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -f -s
